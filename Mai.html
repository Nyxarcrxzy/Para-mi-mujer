<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pink Heart 3D Premium Neon Text</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(48, 10, 30, 0.26) 0%, rgba(0, 0, 0, 0) 44%),
        #000;
    }

    canvas {
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .message-wrap {
      width: min(1200px, 94vw);
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding-left: 40vw;
      box-sizing: border-box;
    }

    .message {
      opacity: 0;
      transform: translate3d(0, 20px, 0) scale(0.985);
      filter: blur(10px);
      text-align: left;
      white-space: nowrap;
      line-height: 0.92;
      user-select: none;
    }

    .message .top {
      display: block;
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(22px, 2.6vw, 38px);
      letter-spacing: 0.18em;
      color: #ffd8ea;
      text-shadow:
        0 0 4px rgba(255, 230, 240, 0.95),
        0 0 10px rgba(255, 170, 215, 0.85),
        0 0 22px rgba(255, 110, 190, 0.55),
        0 0 48px rgba(255, 80, 170, 0.25);
    }

    .message .bottom {
      display: block;
      margin-top: 8px;
      font-family: "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(48px, 6.2vw, 88px);
      letter-spacing: 0.10em;
      color: #ffc4df;
      text-shadow:
        0 0 6px rgba(255, 236, 244, 0.98),
        0 0 14px rgba(255, 184, 220, 0.90),
        0 0 30px rgba(255, 110, 190, 0.62),
        0 0 66px rgba(255, 78, 168, 0.32);
    }

    @media (max-width: 900px) {
      .message-wrap {
        padding-left: 0;
        justify-content: center;
        align-items: flex-end;
        padding-bottom: 10vh;
      }

      .message {
        text-align: center;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="message-wrap">
      <div class="message" id="loveText">
        <span class="top">I LOVE YOU</span>
        <span class="bottom">Mai</span>
      </div>
    </div>
  </div>

  <script>
    (function () {
      if (!window.THREE) return;

      var scene, camera, renderer, clock, controls;
      var heartGeometry, heartMaterial, heartPoints;

      var heartPositions, heartColors, heartAlphas, heartSizes;
      var heartTargetPos, heartPhaseSeed, heartPathU, heartJitterAmp;

      var loveText = document.getElementById("loveText");

      var DPR_MAX = 2.0;

      var HEART_SCALE_X = 3.12;
      var HEART_SCALE_Y = 2.86;
      var HEART_THICKNESS = 0.50;
      var HEART_Z = 12.0;
      var HEART_OFFSET_X = -35.0;

      var START_DELAY = 0.55;
      var DRAW_DURATION = 7.0;
      var HOLD_DURATION = 5.0;
      var ERASE_DURATION = 5.8;
      var TRAIL_WIDTH = 0.040;

      function smoothstep(a, b, x) {
        var t = Math.max(0, Math.min(1, (x - a) / (b - a)));
        return t * t * (3 - 2 * t);
      }

      function clamp01(v) {
        return Math.max(0, Math.min(1, v));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function heartXY(t) {
        var x = 16 * Math.pow(Math.sin(t), 3);
        var y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
        return { x: x, y: y };
      }

      function heartTangent(t) {
        var dt = 0.0008;
        var p1 = heartXY(t - dt);
        var p2 = heartXY(t + dt);
        return { x: p2.x - p1.x, y: p2.y - p1.y };
      }

      function pathPointFromU(u) {
        var t = Math.PI - u * Math.PI * 2.0;
        var p = heartXY(t);
        return {
          x: p.x * HEART_SCALE_X + HEART_OFFSET_X,
          y: p.y * HEART_SCALE_Y,
          t: t
        };
      }

      function particleCountByScreen() {
        var area = window.innerWidth * window.innerHeight;
        if (area >= 2560 * 1440) return 50000;
        if (area >= 1920 * 1080) return 36000;
        if (area >= 1366 * 768) return 25000;
        return 17000;
      }

      function makeParticleTexture() {
        var c = document.createElement("canvas");
        c.width = 256;
        c.height = 256;
        var g = c.getContext("2d");

        var grad = g.createRadialGradient(128, 128, 0, 128, 128, 128);
        grad.addColorStop(0.00, "rgba(255,255,255,1.00)");
        grad.addColorStop(0.12, "rgba(255,245,249,0.99)");
        grad.addColorStop(0.28, "rgba(255,218,236,0.92)");
        grad.addColorStop(0.55, "rgba(255,135,200,0.44)");
        grad.addColorStop(1.00, "rgba(255,135,200,0.00)");

        g.fillStyle = grad;
        g.fillRect(0, 0, 256, 256);

        var tex = new THREE.CanvasTexture(c);
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        return tex;
      }

      function makePointsMaterial(texture, baseSize) {
        var vs =
          "attribute float alpha;\n" +
          "attribute float sizeMul;\n" +
          "varying vec3 vColor;\n" +
          "varying float vAlpha;\n" +
          "uniform float uSize;\n" +
          "uniform float uPixelRatio;\n" +
          "void main(){\n" +
          "  vColor = color;\n" +
          "  vAlpha = alpha;\n" +
          "  vec4 mv = modelViewMatrix * vec4(position, 1.0);\n" +
          "  gl_PointSize = uSize * sizeMul * uPixelRatio * (118.0 / -mv.z);\n" +
          "  gl_Position = projectionMatrix * mv;\n" +
          "}";

        var fs =
          "varying vec3 vColor;\n" +
          "varying float vAlpha;\n" +
          "uniform sampler2D uTexture;\n" +
          "void main(){\n" +
          "  vec4 tex = texture2D(uTexture, gl_PointCoord);\n" +
          "  float a = tex.a * vAlpha;\n" +
          "  if(a < 0.01) discard;\n" +
          "  gl_FragColor = vec4(vColor, a);\n" +
          "}";

        return new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
          vertexColors: true,
          uniforms: {
            uSize: { value: baseSize },
            uPixelRatio: { value: Math.min(window.devicePixelRatio || 1, DPR_MAX) },
            uTexture: { value: texture }
          },
          vertexShader: vs,
          fragmentShader: fs
        });
      }

      function initHeart(texture) {
        var count = particleCountByScreen();

        heartGeometry = new THREE.BufferGeometry();
        heartPositions = new Float32Array(count * 3);
        heartColors = new Float32Array(count * 3);
        heartAlphas = new Float32Array(count);
        heartSizes = new Float32Array(count);

        heartTargetPos = new Float32Array(count * 3);
        heartPhaseSeed = new Float32Array(count);
        heartPathU = new Float32Array(count);
        heartJitterAmp = new Float32Array(count);

        var startPoint = pathPointFromU(0.0);

        for (var i = 0; i < count; i++) {
          var i3 = i * 3;

          var u = Math.random();
          heartPathU[i] = u;

          var pp = pathPointFromU(u);
          var t = pp.t;
          var hp = heartXY(t);
          var tg = heartTangent(t);

          var len = Math.sqrt(tg.x * tg.x + tg.y * tg.y) + 1e-6;
          var nx = -tg.y / len;
          var ny = tg.x / len;

          var thickness = Math.pow(Math.random(), 2.0) * HEART_THICKNESS;
          var side = Math.random() < 0.5 ? -1 : 1;
          var fuzz = thickness * side;

          var tx = (hp.x * HEART_SCALE_X + HEART_OFFSET_X) + nx * fuzz;
          var ty = (hp.y * HEART_SCALE_Y) + ny * fuzz;
          var tz = (Math.random() - 0.5) * HEART_Z + Math.sin(t * 2.0) * 0.9;

          heartTargetPos[i3] = tx;
          heartTargetPos[i3 + 1] = ty;
          heartTargetPos[i3 + 2] = tz;

          heartPositions[i3] = startPoint.x + (Math.random() - 0.5) * 1.05;
          heartPositions[i3 + 1] = startPoint.y + (Math.random() - 0.5) * 1.05;
          heartPositions[i3 + 2] = (Math.random() - 0.5) * 0.85;

          heartPhaseSeed[i] = Math.random() * Math.PI * 2.0;
          heartJitterAmp[i] = 0.018 + Math.random() * 0.050;

          var pinkMix = Math.random();
          heartColors[i3] = 1.0;
          heartColors[i3 + 1] = 0.70 + (1.0 - pinkMix) * 0.14;
          heartColors[i3 + 2] = 0.86 + pinkMix * 0.10;

          heartAlphas[i] = 0.0;
          heartSizes[i] = 0.82 + Math.random() * 0.42;
        }

        heartGeometry.setAttribute("position", new THREE.BufferAttribute(heartPositions, 3));
        heartGeometry.setAttribute("color", new THREE.BufferAttribute(heartColors, 3));
        heartGeometry.setAttribute("alpha", new THREE.BufferAttribute(heartAlphas, 1));
        heartGeometry.setAttribute("sizeMul", new THREE.BufferAttribute(heartSizes, 1));

        heartMaterial = makePointsMaterial(texture, 1.08);
        heartPoints = new THREE.Points(heartGeometry, heartMaterial);
        scene.add(heartPoints);
      }

      function init() {
        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 1600);
        camera.position.set(0, 0, 166);

        renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: false,
          powerPreference: "high-performance"
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, DPR_MAX));
        renderer.setClearColor(0x000000, 1);
        document.body.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.055;
        controls.enablePan = false;
        controls.rotateSpeed = 0.7;
        controls.minDistance = 105;
        controls.maxDistance = 280;
        controls.target.set(-4, 0, 0);
        controls.minPolarAngle = Math.PI * 0.30;
        controls.maxPolarAngle = Math.PI * 0.70;

        var texture = makeParticleTexture();
        initHeart(texture);

        clock = new THREE.Clock();
        window.addEventListener("resize", onResize);
      }

      function animateHeart(time, drawEnd, holdEnd, eraseEnd) {
        var p = heartGeometry.attributes.position.array;
        var a = heartGeometry.attributes.alpha.array;

        var drawP = smoothstep(START_DELAY, drawEnd, time);
        var eraseP = smoothstep(holdEnd, eraseEnd, time);

        var drawHead = drawP;
        var eraseHead = eraseP;

        var drawHeadPoint = pathPointFromU(drawHead);
        var eraseHeadPoint = pathPointFromU(eraseHead);
        var settled = smoothstep(drawEnd - 0.8, drawEnd + 1.1, time);

        for (var i = 0; i < a.length; i++) {
          var i3 = i * 3;

          var u = heartPathU[i];
          var tx = heartTargetPos[i3];
          var ty = heartTargetPos[i3 + 1];
          var tz = heartTargetPos[i3 + 2];

          var revealIn = smoothstep(u - TRAIL_WIDTH, u + 0.008, drawHead);
          var revealOut = 1.0 - smoothstep(u - TRAIL_WIDTH, u + 0.008, eraseHead);
          var life = revealIn * revealOut;

          var travelIn = clamp01((drawHead - u) / TRAIL_WIDTH);
          var travelOut = clamp01((eraseHead - u) / TRAIL_WIDTH);

          var x = tx;
          var y = ty;
          var z = tz;

          if (revealIn < 0.999) {
            x = lerp(drawHeadPoint.x, tx, travelIn);
            y = lerp(drawHeadPoint.y, ty, travelIn);
            z = lerp(0.0, tz, travelIn);
          }

          if (eraseP > 0.0 && revealOut < 0.999) {
            x = lerp(tx, eraseHeadPoint.x, travelOut);
            y = lerp(ty, eraseHeadPoint.y, travelOut);
            z = lerp(tz, 0.0, travelOut);
          }

          var ph = heartPhaseSeed[i] + time * 0.55;
          var vib = heartJitterAmp[i] * (0.12 + (1.0 - settled) * 0.28);

          x += Math.sin(ph * 1.28) * vib;
          y += Math.cos(ph * 1.06) * vib;
          z += Math.sin(ph * 0.92) * vib * 0.32;

          p[i3] = x;
          p[i3 + 1] = y;
          p[i3 + 2] = z;

          var tw = 0.90 + 0.10 * Math.sin(ph * 1.35);
          a[i] = life * (0.54 + 0.46 * tw);
        }

        heartGeometry.attributes.position.needsUpdate = true;
        heartGeometry.attributes.alpha.needsUpdate = true;
        heartMaterial.uniforms.uSize.value = 1.08 + Math.sin(time * 0.65) * 0.010;
      }

      function animateText(time, drawEnd, holdEnd, eraseEnd) {
        var textIn = smoothstep(drawEnd - 1.5, drawEnd + 0.45, time);
        var textOut = 1.0 - smoothstep(holdEnd + 0.10, eraseEnd - 0.15, time);
        var vis = textIn * textOut;

        var blur = 10 - vis * 10;
        var lift = 18 - vis * 18;
        var scale = 0.985 + vis * 0.015;

        loveText.style.opacity = vis.toFixed(3);
        loveText.style.filter = "blur(" + blur.toFixed(2) + "px)";
        loveText.style.transform =
          "translate3d(0," + lift.toFixed(2) + "px,0) scale(" + scale.toFixed(3) + ")";
      }

      function animate() {
        requestAnimationFrame(animate);

        var time = clock.getElapsedTime();
        var drawEnd = START_DELAY + DRAW_DURATION;
        var holdEnd = drawEnd + HOLD_DURATION;
        var eraseEnd = holdEnd + ERASE_DURATION;

        animateHeart(time, drawEnd, holdEnd, eraseEnd);
        animateText(time, drawEnd, holdEnd, eraseEnd);

        controls.update();
        renderer.render(scene, camera);
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, DPR_MAX));
        heartMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio || 1, DPR_MAX);
      }

      init();
      animate();
    })();
  </script>
</body>
</html>
